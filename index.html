<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nav">
    <div class="nav-left">
      <a href="#" class="nav-link" id="works-btn">Works</a>
      <a href="#" class="nav-link" id="about-btn">About</a>
    </div>
    <div class="nav-right">
      <a href="#" class="nav-link" id="contact-btn">Contact</a>
      <a href="#" class="nav-link">English</a>
    </div>
  </header>

  <!-- Contact popup -->
  <div class="contact-popup" id="contact-popup">
    <div class="contact-backdrop" id="contact-backdrop"></div>
    <div class="contact-hand" id="contact-hand"><img src="Image/Contact/손.png" alt=""></div>
    <div class="contact-card">
      <img src="Image/Contact/namecard.png" alt="Contact">
      <a class="contact-link contact-link--email" href="mailto:type.ieung@gmail.com"></a>
      <a class="contact-link contact-link--instagram" href="https://www.instagram.com/typieung_here/" target="_blank"></a>
    </div>
  </div>

  <!-- About overlay -->
  <div class="about-overlay" id="about-overlay">
    <div class="about-col about-col--empty">
      <p class="about-title">About TypiEung</p>
    </div>
    <div class="about-col about-col--text">
      <p class="about-desc">'타입이응'은 폰트 디자이너 이유빈이 운영하는 폰트 파운더리 입니다. 일로도, 취미로도 글자를 그리며 워라밸의 경계를 무너트리며 살고 있습니다. 좋아하는 것들을 크게 외치고 싶어 폰트로 목소리를 내고 있습니다.</p>
    </div>
    <div class="about-col about-col--image">
      <img src="Image/About/Profile.png" alt="About">
    </div>
  </div>

  <!-- Works overlay -->
  <div class="works-overlay" id="works-overlay">

    <!-- Left half: tabs + [list | detail] -->
    <div class="works-left">

      <!-- Tab row 1: always visible -->
      <div class="works-row works-row--cat" id="works-row-cat">
        <button class="wtab" data-cat="Fonts">Fonts</button>
        <button class="wtab" data-cat="Letterform">Letterform</button>
        <button class="wtab" data-cat="Book">Book</button>
      </div>

      <!-- Tab row 2: type (Fonts only) — buttons generated by JS -->
      <div class="works-row works-row--type hidden" id="works-row-type"></div>

      <!-- Tab row 3: year (Fonts only) — buttons generated by JS -->
      <div class="works-row works-row--year hidden" id="works-row-year"></div>

      <!-- Content: project list + detail + image (desktop only) -->
      <div class="works-body">
        <ul class="works-list" id="works-list"></ul>
        <div class="works-detail" id="works-detail"></div>
        <div class="works-image-panel" id="works-image-panel">
          <img id="works-hover-img" src="" alt="">
        </div>
      </div>

    </div>

    <!-- Mobile: filtered project cards -->
    <div class="works-mobile-grid" id="works-mobile-grid"></div>

  </div>

  <section class="hero">
    <div class="hero-logo-group" id="hero-logo-group">
      <div class="hero-logo" id="hero-logo" contenteditable="true" spellcheck="false">TypiEung</div>
      <span class="hero-cursor" id="hero-cursor"></span>
    </div>
    <div class="hero-cursor-tip" id="hero-cursor-tip">☝︎You can type anything here.</div>
  </section>

  <div class="projects-fade"></div>
<section class="projects">
    <div class="proj-col" id="proj-col-left"></div>
    <div class="proj-col" id="proj-col-right"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
