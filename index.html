<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="nav">
    <div class="nav-left">
      <a href="#" class="nav-link" id="works-btn">Works</a>
      <a href="#" class="nav-link">About</a>
    </div>
    <div class="nav-right">
      <a href="#" class="nav-link">Contact</a>
      <a href="#" class="nav-link">English</a>
    </div>
  </header>

  <!-- Works overlay -->
  <div class="works-overlay" id="works-overlay">

    <!-- Left half: tabs + [list | detail] -->
    <div class="works-left">

      <!-- Tab row 1: always visible -->
      <div class="works-row works-row--cat" id="works-row-cat">
        <button class="wtab" data-cat="Fonts">Fonts</button>
        <button class="wtab" data-cat="Letterform">Letterform</button>
        <button class="wtab" data-cat="Book">Book</button>
      </div>

      <!-- Tab row 2: type (Fonts only) — buttons generated by JS -->
      <div class="works-row works-row--type hidden" id="works-row-type"></div>

      <!-- Tab row 3: year (Fonts only) — buttons generated by JS -->
      <div class="works-row works-row--year hidden" id="works-row-year"></div>

      <!-- Content: project list + detail -->
      <div class="works-body">
        <ul class="works-list" id="works-list"></ul>
        <div class="works-detail" id="works-detail"></div>
      </div>

    </div>

    <!-- Right half: hover image -->
    <div class="works-image-panel" id="works-image-panel">
      <img id="works-hover-img" src="" alt="">
    </div>

  </div>

  <section class="hero">
    <div class="hero-logo-group" id="hero-logo-group">
      <div class="hero-logo" id="hero-logo" contenteditable="true" spellcheck="false">Typieung</div>
      <span class="hero-cursor" id="hero-cursor"></span>
    </div>
  </section>

  <section class="projects">
    <div class="proj-col" id="proj-col-left"></div>
    <div class="proj-col" id="proj-col-right"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
